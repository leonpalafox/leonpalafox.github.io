remote_theme: "mmistakes/minimal-mistakes@4.28.0"

minimal_mistakes_skin: "default"

# Site Settings
locale: "en"
title: "León Palafox"
title_separator: "-"
name: "León Palafox"
description: "León Palafox is an AI leader in Mexico focused on financial AI, recommender systems, personalization engines, MLOps, experimentation, and AI strategy."
url: "https://www.leonpalafox.com"
baseurl: "" # the subpath of your site, e.g. "/blog"
repository: "leonpalafox/leonpalafox.github.io"
teaser:
# breadcrumbs: false
words_per_minute: 200

comments:
  provider:
  disqus:
    shortname:
  discourse:
    server:
  facebook:
    appid:
    num_posts:
    colorscheme:

staticman:
  allowedFields:
  branch:
  commitMessage:
  filename:
  format:
  moderation:
  path:
  requiredFields:
  transforms:
    email:
  generatedFields:
    date:
      type:
      options:
        format:

reCaptcha:
  siteKey:
  secret:

atom_feed:
  path:

# SEO Related
google_site_verification: ""
bing_site_verification: ""
yandex_site_verification:
naver_site_verification:

# Social Sharing
twitter:
  username: "leonpalafox"
facebook:
  username:
  app_id:
  publisher:
og_image: "/assets/images/header.jpg"

social:
  type: "Person"
  name: "León Palafox"
  links:
    - "https://www.leonpalafox.com/"
    - "https://www.linkedin.com/in/leonpalafox/"
    - "https://twitter.com/leonpalafox"
    - "https://github.com/leonpalafox"

analytics:
  provider: "google-gtag"
  google:
    tracking_id: "G-M9BV46V3PD"
    anonymize_ip: false

# Site Author
author:
  name: "León Palafox"
  avatar: "/assets/images/bio-photo.png"
  bio: "Director of the AI Innovation Lab at GBM. PhD from the University of Tokyo. Lecturer on AI at Universidad Panamericana and columnist at El Financiero."
  location: "Mexico City, Mexico"
  email: lpalafox@up.edu.mx
  github: "leonpalafox"
  linkedin: "leonpalafox"
  stackoverflow: "486262/leon-palafox"
  twitter: "leonpalafox"


# Reading Files
include:
  - .htaccess
  - _pages
exclude:
  - "*.sublime-project"
  - "*.sublime-workspace"
  - vendor
  - .asset-cache
  - .bundle
  - .jekyll-assets-cache
  - .sass-cache
  - assets/js/plugins
  - assets/js/_main.js
  - assets/js/vendor
  - Capfile
  - CHANGELOG
  - config
  - Gemfile
  - Gruntfile.js
  - gulpfile.js
  - LICENSE
  - log
  - node_modules
  - package.json
  - Rakefile
  - README
  - tmp
  - /docs
  - /test
keep_files:
  - .git
  - .svn
encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"

# Conversion
markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false

# Markdown Processing
kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..4
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false

# Sass/SCSS
sass:
  sass_dir: _sass
  style: compressed

# Outputting
permalink: /:categories/:title/
# paginate: 5
# paginate_path: /page:num/
timezone: "America/Mexico_City"

# Plugins
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jemoji
  - jekyll-include-cache
  - jekyll-remote-theme

# mimic GitHub Pages with --safe
whitelist:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jemoji
  - jekyll-include-cache
  - jekyll-remote-theme

# Archives
category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/

# HTML Compression
compress_html:
  clippings: all
  ignore:
    envs: development

# Collections
collections:
  events:
    output: true
    permalink: /:collection/:path/
  courses:
    output: true
    permalink: /:collection/:path/

# Defaults
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      lang: "es"
      image: "/assets/images/header.jpg"
      comments:
      share:
      related: true
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true
      lang: "en"
      image: "/assets/images/header.jpg"
  - scope:
      path: ""
      type: courses
    values:
      layout: single
      author_profile: true
      lang: "en"
      image: "/assets/images/header.jpg"
      toc: true
      classes: wide
  - scope:
      path: ""
      type: events
    values:
      lang: "en"
